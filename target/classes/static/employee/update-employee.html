<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Update</title>
    <script>
      // fetch department list for dropdown
      fetch('http://localhost:8082/departments/all')
        .then(response => response.json())
        .then(data => {
          console.log('Departments:', data);
          const departmentInput = document.getElementById('departmentId');
          data.data.forEach(department => { 
            const option = document.createElement('option');
            option.value = department.id;
            option.textContent = department.name;
            departmentInput.appendChild(option);
          });

          // fetch employee details and fill form
          const urlParams = new URLSearchParams(window.location.search);
          const employeeId = urlParams.get('id');
          if (employeeId) {
            fetch(`http://localhost:8082/employees/detail/${employeeId}`)
              .then(response => response.json())
              .then(data => {
                const employee = data.data;
                console.log('Employee Details:', employee);
                document.getElementById('name').value = employee.name;
                document.getElementById('email').value = employee.email;
                document.getElementById('departmentId').value = employee.departmentId;
                document.getElementById('employeeId').value = employee.id;
                // update combox to show current department
                const departmentInput = document.getElementById('departmentId');
                const options = departmentInput.options;
                for (let i = 0; i < options.length; i++) {
                  if (options[i].value === employee.departmentId) {
                    options[i].selected = true;
                    break;
                  }
                }
              })
              .catch(error => console.error('Error fetching employee details:', error));
          }

        }).catch(error => console.error('Error fetching departments:', error));

      function updateEmployee() {
        const urlParams = new URLSearchParams(window.location.search);
        const employeeId = urlParams.get('id');
        fetch('http://localhost:8082/employees/update', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            updateEmployeeId: employeeId,
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            departmentId: document.getElementById('departmentId').value
          })
        })
        .then(response => {
          if (response.ok) {
            alert('Employee updated successfully');
            window.location.href = '/';
          } else {
            alert('Failed to update employee');
          }
        })
        .catch(error => console.error('Error updating employee:', error));
      }
    </script>
</head>
<body>

  <form id="update-employee"  style="margin-bottom: 20px;">
    <input type="hidden" id="id" name="id">
    <div style="padding-bottom: 10px;">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div style="padding-bottom: 10px;">
      <label for="email">Email:</label>
      <input type="text" id="email" name="email" required>
    </div>
    <div style="padding-bottom: 10px;">
      <label for="department">Department:</label>
      <select id="departmentId" name="departmentId" required></select>
    </div>
    <button type="button" onclick="updateEmployee()">Update Employee</button>
  </form>

  <button onclick="window.location.href='/'">Back to Home</button>
</body>
</html>
