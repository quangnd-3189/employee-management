<!DOCTYPE html>
<html lang="en">  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Statistics</title>
</head>
<body>
    <h1>Employee Statistics</h1>
    <p>Total Employees: <span th:text="${employeeCount}"></span></p>
    <p>Total Departments: <span th:text="${departmentCount}"></span></p>
    <h2>Employees Per Department</h2>
    <table border="1" style="margin-bottom: 20px;">
        <tr>
            <th>Department Name</th>
            <th>Employee Count</th>
        </tr>
        <tr th:each="dept : ${employeePerDepartment}">
            <td th:text="${dept[0]}"></td>
            <td th:text="${dept[1]}"></td>
        </tr>
    </table>
    <button onclick="window.location.href='/'">Back to Home</button>
</body>
</html>
