<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/paginationjs@2.6.0/dist/pagination.css"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/paginationjs@2.6.0/dist/pagination.min.js"></script>
</head>
<body>
  
  <button style="margin-bottom: 10px;" onclick="addEmployee()">Add Employee</button> <br>

  <input type="text" id="search-input" placeholder="Search by name or department name" style="margin-bottom: 10px; width: 300px; padding: 5px;">
  <select id="search-type" style="margin-left: 10px; padding: 5px;">
    <option value="name">Name</option>
    <option value="departmentName">Department Name</option>
  </select>
  <button onclick="searchEmployees()">Search</button>
  <button onclick="resetSearch()">Reset</button>

  <div id="data-container"></div>
  <div style="padding-top:10px; padding-left:40%" id="pagination-container"></div>

  <script>

    fetch('http://localhost:8082/employees/all')
      .then(response => response.json())
      .then(data => {
        $('#pagination-container').pagination({
            dataSource: data.data,
            pageSize: 10,
            formatResult: function(data) {
              for (var i = 0, len = data.length; i < len; i++) {
                data[i].a = data[i].a + ' -c';
              }
            },
            callback: function(data, pagination) {
              var html = template(data);
              $('#data-container').html(html);
            }
        })
      }).catch(error => console.error('Error fetching employees:', error)); 
    
    function template(data) {
      let html = "";
      // add header
      html += ` 
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding: 10px 0; font-weight: bold;">
          <div style="flex: 1;">Name</div>
          <div style="flex: 2;">Email</div>
          <div style="flex: 1;">Department</div>
          <div style="flex: 1;">Actions</div>
        </div>
      `;
      // add content
      data.forEach(emp => {
        html += `
          <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding: 10px 0;">
            <div style="flex: 1;"> ${emp.name}</div>
            <div style="flex: 2;"> ${emp.email}</div>
            <div style="flex: 1;"> ${emp.departmentName}</div>
            <div style="flex: 1;">
              <button onclick="editEmployee('${emp.id}')">Edit</button>
              <button onclick="deleteEmployee('${emp.id}')">Delete</button>
            </div>
          </div>
        `;
      });
      return html;
    }

    function addEmployee() {
      window.location.href = '/employee/add-employee.html';
    }

    function editEmployee(id) {
      window.location.href = `/employee/update-employee.html?id=${id}`;
    }

    function deleteEmployee(id) {
      if (confirm('Are you sure you want to delete this employee?')) {
        fetch(`http://localhost:8082/employees/delete/${id}`, {
          method: 'DELETE'
        })
        .then(response => {
          if (response.ok) {
            alert('Employee deleted successfully');
            location.reload();
          } else {
            alert('Failed to delete employee');
          }
        })
        .catch(error => console.error('Error deleting employee:', error));
      }
    }
  
    function searchEmployees() {
      const query = document.getElementById('search-input').value;
      const queryType = document.getElementById('search-type').value;
      let url = 'http://localhost:8082/employees/search-all?';
      console.log('Search Query:', query ,'Search Type:', queryType);
      if (queryType === 'name') {
        url += `name=${encodeURIComponent(query)}`;
      } else if (queryType === 'departmentName') {
        url += `department=${encodeURIComponent(query)}`;
      }

      fetch(url)
        .then(response => response.json())
        .then(data => {
          console.log('Search Results:', data.data);
          if(!data.data) {
            $('#data-container').html('<p>No employees found.</p>');
            return;
          }
          $('#pagination-container').pagination({
              dataSource: data.data,
              pageSize: 10,
              callback: function(data, pagination) {
                var html = template(data);
                $('#data-container').html(html);
              }
          })
        })
        .catch(error => console.error('Error searching employees:', error));
    }

    function resetSearch() {
      document.getElementById('search-input').value = '';
      location.reload();
    }
  </script>

</body>
</html>
